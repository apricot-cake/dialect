<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- ?v= はファビコン更新時に上げてブラウザのキャッシュを無効化する -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="検索条件を組み立てると、X・Bluesky・YouTube・niconico・pixiv・はてなブックマーク・5ちゃんねるなど18のSNS・掲示板の検索構文に翻訳して検索ページを開くツール"
    />
    <title>SNSまとめて検索</title>
    <!-- OGP / Twitter Card。SNSでURLを貼ったときのリンクプレビュー用。
         og:image / og:url は origin を含む絶対URLが必須。公開ドメインが
         github.io/dialect と異なる場合は下記4つの origin を差し替える -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SNSまとめて検索" />
    <meta property="og:title" content="SNSまとめて検索" />
    <meta
      property="og:description"
      content="検索条件を組み立てると、各SNS・掲示板の検索構文に翻訳して検索ページを開きます"
    />
    <meta property="og:url" content="https://apricot-cake.github.io/dialect/" />
    <meta
      property="og:image"
      content="https://apricot-cake.github.io/dialect/og.png"
    />
    <meta property="og:image:width" content="2400" />
    <meta property="og:image:height" content="1260" />
    <meta property="og:locale" content="ja_JP" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SNSまとめて検索" />
    <meta
      name="twitter:description"
      content="検索条件を組み立てると、各SNS・掲示板の検索構文に翻訳して検索ページを開きます"
    />
    <meta
      name="twitter:image"
      content="https://apricot-cake.github.io/dialect/og.png"
    />
    <!-- 描画前にテーマを確定してダークモードのちらつきを防ぐ。保存値がなければOS設定に従う -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme')
          var dark = saved
            ? saved === 'dark'
            : matchMedia('(prefers-color-scheme: dark)').matches
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
