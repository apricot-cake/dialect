<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Dialectが送信する検索演算子の定期動作確認の記録。非公式な演算子がいつ・どう確認され、動いているかを公開しています。"
    />
    <title>Dialect — 演算子の稼働状況</title>
    <!-- 描画前にテーマを確定してダークモードのちらつきを防ぐ(index.htmlと同じ処理) -->
    <script>
      ;(function () {
        try {
          var saved = localStorage.getItem('theme')
          var dark = saved ? saved === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/health-main.tsx"></script>
  </body>
</html>
