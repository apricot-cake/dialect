<!-- Dialect のロゴマーク: 角丸カードに3×3ドット(アクセントは1/3/8番目)。
     ヘッダーのロゴと同じ意匠。タブバーの明暗に合わせて配色を切り替える -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .card { fill: #ffffff; }
    .bd { stroke: #e6e8ee; }
    .faint { fill: #aeb2be; }
    .accent { fill: #4d5772; }
    @media (prefers-color-scheme: dark) {
      .card { fill: #363943; }
      .bd { stroke: #ffffff26; }
      .faint { fill: #7e8290; }
      .accent { fill: #9aa9cf; }
    }
  </style>
  <rect x="1" y="1" width="30" height="30" rx="8" class="card" />
  <rect x="1.5" y="1.5" width="29" height="29" rx="7.5" fill="none" class="bd" stroke-width="1" />
  <circle cx="10" cy="10" r="2.1" class="faint" />
  <circle cx="16" cy="10" r="2.1" class="accent" />
  <circle cx="22" cy="10" r="2.1" class="faint" />
  <circle cx="10" cy="16" r="2.1" class="accent" />
  <circle cx="16" cy="16" r="2.1" class="faint" />
  <circle cx="22" cy="16" r="2.1" class="faint" />
  <circle cx="10" cy="22" r="2.1" class="faint" />
  <circle cx="16" cy="22" r="2.1" class="faint" />
  <circle cx="22" cy="22" r="2.1" class="accent" />
</svg>
