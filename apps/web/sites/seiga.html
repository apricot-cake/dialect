<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Dialectがニコニコ静画へ翻訳できる検索条件の一覧と、検索のクセ・落とし穴の解説。"
    />
    <link rel="canonical" href="https://apricot-cake.github.io/dialect/sites/seiga.html" />
    <title>Dialect — ニコニコ静画の検索</title>
    <!-- 描画前にテーマを確定してダークモードのちらつきを防ぐ(index.htmlと同じ処理) -->
    <script>
      ;(function () {
        try {
          var saved = localStorage.getItem('theme')
          var dark = saved ? saved === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body data-platform="seiga">
    <div id="root"></div>
    <script type="module" src="/src/sites-main.tsx"></script>
  </body>
</html>
