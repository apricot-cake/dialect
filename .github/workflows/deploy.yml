name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 既定は読み取りのみ。Pages公開に要る昇格権限は deploy ジョブだけに与える(最小権限)
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # ビルドはpushしないので、認証トークンをローカルgit configに残さない
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Pagesへの公開とOIDC発行はこのジョブに限定する
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
