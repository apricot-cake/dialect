name: CI

# main へマージする前のゲート。決定論的なチェック(型・ビルド・lint・演算子ドリフト・読みドリフト・
# 逆翻訳の往復一致・URL断片帰属)だけを必須にする。外部サイトへ実アクセスする check:urls は不達で
# 赤くなりマージが詰まるため、ここには入れずリリース前に手元/operator-check で回す運用にしている。
# check:operators / check:readings / check:reverse / check:parts / check:props はコードと生成物・
# チェックリストを読むだけでネットワーク不要=決定論的(読みドリフト検査は kuromoji も使わずキー照合
# だけなので辞書も要らない。check:props はシード固定のプロパティテストなので毎回同じ結果になる)。
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # チェックはpushしないので、認証トークンをローカルgit configに残さない
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run fmt:check
      - run: npm run build
      - run: npm run check:operators
      - run: npm run check:readings
      - run: npm run check:reverse
      - run: npm run check:parts
      - run: npm run check:props
      - run: npm run check:smart
